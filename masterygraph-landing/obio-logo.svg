<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="obioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="obioGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(6, 6)">
    <!-- Background circle with gradient -->
    <circle cx="24" cy="24" r="22" fill="url(#obioGrad)"/>
    <!-- Subtle inner glow -->
    <circle cx="24" cy="24" r="18" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Network nodes -->
    <circle cx="24" cy="14" r="4.5" fill="white"/>
    <circle cx="14" cy="28" r="4" fill="white"/>
    <circle cx="34" cy="28" r="4" fill="white"/>
    <circle cx="24" cy="38" r="3.5" fill="white"/>
    
    <!-- Connection lines -->
    <line x1="24" y1="14" x2="14" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="14" x2="34" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="28" x2="24" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="28" x2="24" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="28" x2="34" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- OBIO Text -->
  <text x="62" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" fill="#1f1c19" letter-spacing="-0.02em">OBIO</text>
  
  <!-- Tagline -->
  <text x="62" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500" fill="#7c756d" letter-spacing="0.08em">LEARNING PATHS</text>
</svg>
