<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#favGrad)"/>
  <g filter="url(#glow)" opacity="0.95">
    <circle cx="32" cy="24" r="4" fill="white"/>
    <circle cx="20" cy="36" r="3.5" fill="white"/>
    <circle cx="44" cy="36" r="3.5" fill="white"/>
    <circle cx="32" cy="44" r="3" fill="white"/>
    <line x1="32" y1="24" x2="20" y2="36" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="24" x2="44" y2="36" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="36" x2="32" y2="44" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="36" x2="32" y2="44" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="36" x2="44" y2="36" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
